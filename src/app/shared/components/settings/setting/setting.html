<app-navbar-home></app-navbar-home>
<div class="min-h-screen bg-gray-50 flex items-center mt-5 justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <div class="flex items-start gap-4 mb-8">
      <div class="bg-blue-50 p-3 rounded-full">
        <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d=" নিহত15 7a2 2 0 012 2m-9 5a3 3 0 11-6 0 3 3 0 016 0zm6 3l2 2m0 0l2-2m-2 2v-6a2 2 0 012-2h2m-6 4h2"
          ></path>
        </svg>
      </div>
      <div>
        <h2 class="text-xl font-bold text-gray-900">Change Password</h2>
        <p class="text-sm text-gray-500">Keep your account secure by using a strong password.</p>
      </div>
    </div>

    <form [formGroup]="passwordForm" (ngSubmit)="updatePassword()" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2 text-left"
          >Current password</label
        >
        <input
          type="password"
          formControlName="currentPassword"
          placeholder="Enter current password"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-gray-300"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2 text-left">New password</label>
        <input
          type="password"
          formControlName="newPassword"
          placeholder="Enter new password"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-gray-300"
        />
        <p class="text-[11px] text-gray-400 mt-2 leading-relaxed">
          At least 8 characters with uppercase, lowercase, number, and special character.
        </p>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2 text-left"
          >Confirm new password</label
        >
        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="Re-enter new password"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-gray-300"
        />
      </div>

      <button
        type="submit"
        [disabled]="passwordForm.invalid"
        class="w-full bg-[#83b1f4] hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-colors mt-4 disabled:opacity-50"
      >
        Update password
      </button>
    </form>
  </div>
</div>

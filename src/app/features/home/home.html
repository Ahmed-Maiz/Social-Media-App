<main>
  <section class="bg-[#f0f2f5]">
    <app-navbar-home></app-navbar-home>
    <div class="container mx-auto pt-20 w-6xl min-h-screen">
      <div class="flex gap-4 items-start">
        <!-- routing -->
        <div class="w-1/5 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm sticky top-20">
          <button
            routerLink="feed"
            class="mt-1 flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition text-[#1877f2] bg-[#e7f3ff]"
          >
            <i class="fa-regular fa-newspaper"></i>
            Feed
          </button>
          <button
            routerLink="myPosts"
            class="mt-1 flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition text-slate-700 hover:bg-slate-100"
          >
            <i class="fa-regular fa-eye"></i>
            My Posts
          </button>
          <button
            routerLink="singlPost"
            class="mt-1 flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition text-slate-700 hover:bg-slate-100"
          >
            <i class="fa-solid fa-comment-dots"></i>
            Communit
          </button>
          <button
            routerLink="saved"
            class="mt-1 flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition text-slate-700 hover:bg-slate-100"
          >
            <i class="fa-regular fa-bookmark"></i>
            Saved
          </button>
        </div>
        <!-- posts -->
        <div class="w-1/2 p-0">
          <app-creat-posts></app-creat-posts>
          <!-- <app-singl-post></app-singl-post> -->
          <router-outlet></router-outlet>
        </div>
        <!-- follow -->
        <div class="w-1/4 bg-white shadow-sm border border-slate-200 rounded-2xl p-4 sticky top-20">
          <div class="overflow-y-auto max-h-[550px]">
            <div class="fixed">
              <div class="flex">
                <i class="fa-solid fa-user-group text-blue-400 me-2"></i>
                <h3 class="text-base font-extrabold text-slate-900">Suggested Friends</h3>
                <span
                  class="ms-7 rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600"
                  >5</span
                >
              </div>

              <form class="max-w-md mx-auto">
                <label for="search" class="block mb-2.5 text-sm font-medium text-heading sr-only"
                  >Search</label
                >
                <div class="relative">
                  <div
                    class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none"
                  >
                    <svg
                      class="w-4 h-4 text-body"
                      aria-hidden="true"
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-width="2"
                        d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                      />
                    </svg>
                  </div>
                  <input
                    type="search"
                    id="search"
                    class="block w-full py-2 pr-3 mt-5 pl-9 bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl focus:bg-white focus:border-brand shadow-xs placeholder:text-body"
                    placeholder="Search friends..."
                    required
                  />
                </div>
              </form>
            </div>
            <div class="mt-[100px]">
              <app-follow></app-follow>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
